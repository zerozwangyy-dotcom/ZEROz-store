<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>ZERO TWO | Cyber Nexus</title>
    <!-- Google Identity Services -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <!-- Font Awesome & Google Fonts -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: radial-gradient(circle at 10% 20%, #0a0a0f, #010101);
            font-family: 'Space Grotesk', monospace;
            color: #f0eef7;
            min-height: 100vh;
        }

        .cyber-glow {
            text-shadow: 0 0 5px #ff69b4, 0 0 12px #ff1493;
        }

        .btn-neon {
            background: linear-gradient(95deg, #1f1a2e, #0a0815);
            border: 1px solid rgba(255, 105, 180, 0.6);
            box-shadow: 0 0 8px rgba(255, 20, 147, 0.5);
            transition: all 0.25s ease;
            font-weight: bold;
            cursor: pointer;
            padding: 12px 24px;
            border-radius: 40px;
            font-size: 16px;
            color: #ffddf5;
        }

        .btn-neon:hover {
            transform: scale(1.02);
            border-color: #ff69b4;
            box-shadow: 0 0 15px #ff1493;
        }

        .sidebar {
            position: fixed;
            top: 0;
            left: -280px;
            width: 280px;
            height: 100%;
            background: rgba(10, 5, 20, 0.95);
            backdrop-filter: blur(12px);
            border-right: 1px solid #ff66c0;
            transition: 0.3s ease;
            z-index: 1000;
            padding: 2rem 1rem;
        }

        .sidebar.open {
            left: 0;
        }

        .sidebar li {
            list-style: none;
            margin: 2rem 0;
            padding: 0.8rem;
            border-bottom: 1px dashed #ff66b5;
            cursor: pointer;
            color: #ffc0e0;
            font-size: 1.1rem;
        }

        .hamburger-icon {
            position: fixed;
            top: 1.2rem;
            left: 1.2rem;
            font-size: 28px;
            background: #000000aa;
            backdrop-filter: blur(6px);
            padding: 8px 12px;
            border-radius: 20px;
            border: 1px solid #ff66aa;
            color: #ff66c0;
            z-index: 1100;
            cursor: pointer;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 1.5rem;
        }

        .login-card {
            background: rgba(10, 8, 20, 0.7);
            backdrop-filter: blur(12px);
            border-radius: 42px;
            border: 1px solid #ff66aa;
            padding: 2.5rem;
            text-align: center;
            max-width: 500px;
            margin: 8vh auto;
        }

        .grid-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 25px;
            justify-content: center;
            margin-top: 40px;
        }

        .action-btn {
            background: #110c1c;
            border: 1px solid #ff77bb;
            padding: 14px 28px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 60px;
            width: 240px;
            text-align: center;
            color: #ffddf5;
        }

        .welcome-banner {
            background: linear-gradient(135deg, #ff69b422, #ff006622);
            border-radius: 32px;
            padding: 20px;
            margin-top: 60px;
            text-align: center;
            border-left: 6px solid #ff66c0;
        }

        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(8px);
            z-index: 2000;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .spinner {
            width: 60px;
            height: 60px;
            border: 6px solid #ff66b5;
            border-top: 6px solid #ff0066;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .back-btn {
            background: #ff1493;
            padding: 10px 24px;
            border-radius: 40px;
            color: white;
            margin: 20px;
            cursor: pointer;
            display: inline-block;
            border: none;
        }

        .google-manual-btn {
            background: #ffffff;
            color: #333;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 100%;
            margin-top: 15px;
        }

        .google-manual-btn i {
            font-size: 20px;
            color: #4285F4;
        }
    </style>
</head>
<body>
<div id="app"></div>

<script>
    // ========== VERSI SUPER LENGKAP DENGAN MANUAL LOGIN ==========
    
    let currentUser = null;

    function showLoading(show, message = 'Memproses akun...') {
        let loader = document.getElementById('globalLoader');
        if(show) {
            if(!loader) {
                loader = document.createElement('div');
                loader.id = 'globalLoader';
                loader.className = 'loading-overlay';
                loader.innerHTML = '<div class="spinner"></div><div style="margin-top:20px;" id="loadingMsg">' + message + '</div>';
                document.body.appendChild(loader);
            } else {
                const msgEl = document.getElementById('loadingMsg');
                if(msgEl) msgEl.innerText = message;
            }
        } else {
            if(loader) loader.remove();
        }
    }

    // Fungsi login MANUAL (tanpa Google button)
    function manualGoogleLogin() {
        showLoading(true, 'Membuka Google Login...');
        
        // Pilih akun Google via prompt (simulasi, karena di HP lebih gampang pilih akun)
        const email = prompt('Masukkan email Google kamu (contoh: zero22@gmail.com):');
        
        if(!email || email.trim() === '') {
            showLoading(false);
            alert('Email tidak boleh kosong!');
            return;
        }
        
        // Validasi email sederhana
        if(!email.includes('@') || !email.includes('.')) {
            showLoading(false);
            alert('Email tidak valid! Contoh: nama@gmail.com');
            return;
        }
        
        const nameInput = prompt('Masukkan nama lengkap kamu:', email.split('@')[0]);
        const fullName = nameInput || email.split('@')[0];
        const baseUsername = email.split('@')[0];
        const domainUsername = baseUsername + '-zero.com';
        
        const userData = {
            email: email,
            fullName: fullName,
            picture: 'https://ui-avatars.com/api/?background=ff69b4&color=fff&name=' + baseUsername,
            baseUsername: baseUsername,
            domainUsername: domainUsername,
            loginTime: Date.now()
        };
        
        currentUser = userData;
        localStorage.setItem('zeroTwoUser', JSON.stringify(userData));
        
        setTimeout(() => {
            showLoading(false);
            renderMainDashboard();
        }, 1500);
    }

    // Fungsi login dengan Google OAuth asli
    function handleGoogleLogin(response) {
        showLoading(true, 'Memverifikasi akun Google...');
        try {
            const credential = response.credential;
            const payload = JSON.parse(atob(credential.split('.')[1]));
            
            const email = payload.email;
            const fullName = payload.name;
            const picture = payload.picture;
            const baseUsername = email.split('@')[0];
            const domainUsername = baseUsername + '-zero.com';
            
            const userData = {
                email: email,
                fullName: fullName,
                picture: picture,
                baseUsername: baseUsername,
                domainUsername: domainUsername,
                loginTime: Date.now()
            };
            
            currentUser = userData;
            localStorage.setItem('zeroTwoUser', JSON.stringify(userData));
            
            setTimeout(() => {
                showLoading(false);
                renderMainDashboard();
            }, 1500);
            
        } catch(e) {
            showLoading(false);
            alert('Login gagal: ' + e.message);
        }
    }

    function renderLoginPage() {
        const app = document.getElementById('app');
        app.innerHTML = `
            <div class="container">
                <div class="login-card">
                    <i class="fas fa-heart" style="font-size:48px; color:#ff69b4;"></i>
                    <h1 class="cyber-glow">ZERO TWO GATE</h1>
                    <p style="margin: 20px 0;">Login dengan akun Google</p>
                    
                    <!-- Tombol Google OAuth -->
                    <div id="googleBtn"></div>
                    
                    <!-- GARIS PEMISAH -->
                    <div style="margin: 20px 0; display: flex; align-items: center; gap: 10px;">
                        <hr style="flex:1; border-color:#ff66aa;">
                        <span style="color:#ff88cc;">ATAU</span>
                        <hr style="flex:1; border-color:#ff66aa;">
                    </div>
                    
                    <!-- TOMBOL MANUAL (WAJIB ADA BIAR BISA LOGIN) -->
                    <button id="manualLoginBtn" class="btn-neon google-manual-btn">
                        <i class="fab fa-google"></i> Login Manual (Klik Disini)
                    </button>
                    
                    <p style="margin-top: 25px; font-size: 12px; opacity:0.7;">contoh: zero22@gmail.com</p>
                </div>
            </div>
        `;
        
        // Pasang tombol Google OAuth (kalau bisa)
        if(window.google && window.google.accounts) {
            window.google.accounts.id.initialize({
                client_id: '1018944055702-17t2jv9vcb2gq7siqq3d7i6iv4kmd043.apps.googleusercontent.com',
                callback: handleGoogleLogin
            });
            window.google.accounts.id.renderButton(
                document.getElementById('googleBtn'),
                { theme: 'outline', size: 'large', shape: 'pill', text: 'continue_with' }
            );
        } else {
            document.getElementById('googleBtn').innerHTML = '<p style="color:#ffaa88;">⚠️ Google Login bermasalah, pakai tombol manual di bawah!</p>';
        }
        
        // Tombol manual login
        document.getElementById('manualLoginBtn').addEventListener('click', manualGoogleLogin);
    }

    function renderMainDashboard() {
        if(!currentUser) {
            const saved = localStorage.getItem('zeroTwoUser');
            if(saved) {
                currentUser = JSON.parse(saved);
            } else {
                renderLoginPage();
                return;
            }
        }
        
        const app = document.getElementById('app');
        app.innerHTML = `
            <div class="hamburger-icon" id="hamburgerBtn"><i class="fas fa-bars"></i></div>
            <div class="sidebar" id="sidebar">
                <ul>
                    <li id="profileBtn"><i class="fas fa-user"></i> Lihat Profil</li>
                    <li id="ownerBtn"><i class="fab fa-whatsapp"></i> Hubungin Owner</li>
                    <li id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</li>
                </ul>
            </div>
            <div class="container">
                <div class="welcome-banner">
                    <h2 class="cyber-glow">⚡ Welcome to Web Zero Two ⚡</h2>
                    <p>Halo, ${currentUser.fullName?.split(' ')[0] || currentUser.baseUsername}</p>
                    <p style="font-size:14px;">Username: ${currentUser.domainUsername}</p>
                </div>
                <div class="grid-buttons">
                    <button class="action-btn btn-neon" id="apiBtn"><i class="fas fa-code"></i> REST API</button>
                    <button class="action-btn btn-neon" id="linktreeBtn"><i class="fas fa-link"></i> Linktr.ee ZEROz</button>
                    <button class="action-btn btn-neon" id="komunitasBtn"><i class="fas fa-users"></i> Komunitas ZEROz</button>
                    <button class="action-btn btn-neon" id="medsosBtn"><i class="fab fa-tiktok"></i> Akun Medsos ZEROz</button>
                </div>
            </div>
        `;
        
        attachSidebarEvents();
        
        document.getElementById('apiBtn').addEventListener('click', () => renderApiPage());
        document.getElementById('linktreeBtn').addEventListener('click', () => renderLinkPage());
        document.getElementById('komunitasBtn').addEventListener('click', () => renderKomunitasPage());
        document.getElementById('medsosBtn').addEventListener('click', () => renderMedsosPage());
    }

    function renderApiPage() {
        const app = document.getElementById('app');
        const apiKey = 'ZT2_' + currentUser.baseUsername + '_' + Math.random().toString(36).substring(2,10).toUpperCase();
        app.innerHTML = `
            <div class="container">
                <button class="back-btn" id="backBtn"><i class="fas fa-arrow-left"></i> Kembali</button>
                <div class="welcome-banner" style="text-align:center;">
                    <h2 class="cyber-glow">🔌 REST API Endpoint</h2>
                    <p><strong>Domain API:</strong> <code style="background:#000; padding:8px; border-radius:12px;">ZeroTwo/api/${currentUser.baseUsername}</code></p>
                    <p><strong>API Key:</strong> <code id="apiKeyText" style="background:#000; padding:8px; border-radius:12px;">${apiKey}</code></p>
                    <button class="btn-neon" id="copyBtn" style="margin-top:20px;">📋 Salin API Key</button>
                </div>
            </div>
        `;
        document.getElementById('backBtn').addEventListener('click', () => renderMainDashboard());
        document.getElementById('copyBtn').addEventListener('click', () => {
            navigator.clipboard.writeText(apiKey);
            alert('API Key disalin!');
        });
    }

    function renderLinkPage() {
        const app = document.getElementById('app');
        app.innerHTML = `
            <div class="container">
                <button class="back-btn" id="backBtn"><i class="fas fa-arrow-left"></i> Kembali</button>
                <div style="text-align:center; margin-top:40px;">
                    <h1 class="cyber-glow" style="font-size:2rem;">📱 Web Bisnis ZEROzWangyy</h1>
                    <div style="margin-top:50px; display:flex; flex-direction:column; gap:20px; align-items:center;">
                        <button class="action-btn btn-neon" id="linktreeWeb">🔗 Linktr.ee ZEROz</button>
                        <button class="action-btn btn-neon" id="lynkId">🆔 Lynk.id ZEROzWangyy</button>
                    </div>
                </div>
            </div>
        `;
        document.getElementById('backBtn').addEventListener('click', () => renderMainDashboard());
        document.getElementById('linktreeWeb').addEventListener('click', () => window.open('https://linktr.ee/zerozwangyy_12', '_blank'));
        document.getElementById('lynkId').addEventListener('click', () => window.open('https://lynk.id/zerozwangyy', '_blank'));
    }

    function renderKomunitasPage() {
        const app = document.getElementById('app');
        app.innerHTML = `
            <div class="container">
                <button class="back-btn" id="backBtn"><i class="fas fa-arrow-left"></i> Kembali</button>
                <div style="text-align:center;">
                    <h2 class="cyber-glow" style="font-size:2rem;">Komunitas ZEROz</h2>
                    <div style="margin-top:40px; display:flex; flex-direction:column; gap:20px; align-items:center;">
                        <button class="action-btn btn-neon" id="groupRoom">💬 Group room zero two</button>
                        <button class="action-btn btn-neon" id="saluranBot">🤖 Saluran bot zero two ai</button>
                        <button class="action-btn btn-neon" id="saluranPreset">⚙️ Saluran PRESET ZEROz</button>
                        <button class="action-btn btn-neon" id="stickerChan">🎨 Saluran stiker zero two</button>
                    </div>
                </div>
            </div>
        `;
        document.getElementById('backBtn').addEventListener('click', () => renderMainDashboard());
        document.getElementById('groupRoom').addEventListener('click', () => window.open('https://chat.whatsapp.com/K3D6KzY62PS37TeCsn9M2B', '_blank'));
        document.getElementById('saluranBot').addEventListener('click', () => window.open('https://whatsapp.com/channel/0029VbAh3OwGOj9nf1CHs23U', '_blank'));
        document.getElementById('saluranPreset').addEventListener('click', () => window.open('https://whatsapp.com/channel/0029VbC4yrn1noz15LrD810G', '_blank'));
        document.getElementById('stickerChan').addEventListener('click', () => window.open('https://whatsapp.com/channel/0029Vb6GP9WLY6dDvo6KYv1i', '_blank'));
    }

    function renderMedsosPage() {
        const app = document.getElementById('app');
        app.innerHTML = `
            <div class="container">
                <button class="back-btn" id="backBtn"><i class="fas fa-arrow-left"></i> Kembali</button>
                <div style="text-align:center;">
                    <h2 class="cyber-glow" style="font-size:2rem;">🌐 Akun Medsos ZEROz</h2>
                    <div style="margin-top:50px; display:flex; flex-direction:column; gap:20px; align-items:center;">
                        <button class="action-btn btn-neon" id="tiktokBtn"><i class="fab fa-tiktok"></i> TikTok</button>
                        <button class="action-btn btn-neon" id="youtubeBtn"><i class="fab fa-youtube"></i> YouTube</button>
                    </div>
                </div>
            </div>
        `;
        document.getElementById('backBtn').addEventListener('click', () => renderMainDashboard());
        document.getElementById('tiktokBtn').addEventListener('click', () => window.open('https://www.tiktok.com/@gm_zero_12', '_blank'));
        document.getElementById('youtubeBtn').addEventListener('click', () => window.open('https://YouTube.com/@gm_zero_12', '_blank'));
    }

    function attachSidebarEvents() {
        const sidebar = document.getElementById('sidebar');
        const hamburger = document.getElementById('hamburgerBtn');
        
        if(hamburger) {
            hamburger.addEventListener('click', () => sidebar.classList.toggle('open'));
        }
        
        document.getElementById('profileBtn')?.addEventListener('click', () => {
            sidebar.classList.remove('open');
            alert('📋 PROFIL ZERO TWO\n\n┌─────────────────┐\n│ Username: ' + currentUser.domainUsername + '\n│ Email: ' + currentUser.email + '\n│ Nama: ' + currentUser.fullName + '\n└─────────────────┘');
        });
        
        document.getElementById('ownerBtn')?.addEventListener('click', () => {
            sidebar.classList.remove('open');
            window.open('https://wa.me/6285187191819', '_blank');
        });
        
        document.getElementById('logoutBtn')?.addEventListener('click', () => {
            localStorage.removeItem('zeroTwoUser');
            currentUser = null;
            renderLoginPage();
            sidebar.classList.remove('open');
        });
    }

    // Mulai aplikasi
    const savedUser = localStorage.getItem('zeroTwoUser');
    if(savedUser) {
        currentUser = JSON.parse(savedUser);
        renderMainDashboard();
    } else {
        renderLoginPage();
    }
</script>
</body>
</html>
